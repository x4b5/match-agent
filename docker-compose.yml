services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Explicit port not strictly needed for internal communication, but useful for direct access
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - MATCHFLIX_DB_PATH=/app/data/matchflix.db
      - MATCHFLIX_ICLOUD_BASE=/app/data/matchflix
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    environment:
      - PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
